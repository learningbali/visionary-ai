<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro AI Video Storyboard v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .file-input-wrapper:hover .file-input-icon { color: #2563eb; transform: scale(1.1); }
        .file-input-icon { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen py-8 px-4 md:px-8">
    
    <div class="max-w-5xl mx-auto bg-white rounded-[2rem] shadow-2xl overflow-hidden border border-slate-200">
        <div class="bg-gradient-to-r from-slate-900 to-slate-800 p-10 text-white relative overflow-hidden">
            <div class="relative z-10">
                <h1 class="text-4xl font-extrabold tracking-tight mb-2">Pro AI Video Storyboard <span class="text-blue-400">v3</span></h1>
                <p class="text-slate-300 text-lg max-w-2xl">Otomatisasi pembuatan prompt sinematik 15 detik. Terintegrasi dengan Backend Vercel.</p>
            </div>
            <div class="absolute top-0 right-0 opacity-10 pointer-events-none text-9xl">
                <i class="fas fa-film"></i>
            </div>
        </div>

        <div class="p-10 space-y-10">
            <!-- Section 1: Media Uploads -->
            <div class="bg-slate-50 p-6 rounded-2xl border border-slate-200">
                <h2 class="text-xl font-bold text-slate-800 mb-4"><i class="fas fa-cloud-upload-alt mr-2 text-blue-600"></i>1. Masukkan Referensi Media</h2>
                
                <div class="grid md:grid-cols-3 gap-6">
                    <div class="space-y-2">
                        <label class="block text-sm font-semibold text-slate-700">Upload Foto (Maks 4)</label>
                        <div class="relative file-input-wrapper cursor-pointer border-2 border-dashed border-slate-300 rounded-xl p-4 text-center hover:border-blue-500 bg-white transition">
                            <input type="file" accept="image/*" multiple id="photoUpload" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onchange="updateFileCount('photoUpload', 'photoCount', 4)">
                            <i class="fas fa-images text-2xl text-slate-400 file-input-icon mb-2"></i>
                            <p class="text-xs text-slate-500" id="photoCount">Klik atau Drag 4 foto ke sini</p>
                        </div>
                    </div>
                    
                    <div class="space-y-2">
                        <label class="block text-sm font-semibold text-slate-700">Upload Video (Maks 1)</label>
                        <div class="relative file-input-wrapper cursor-pointer border-2 border-dashed border-slate-300 rounded-xl p-4 text-center hover:border-blue-500 bg-white transition">
                            <input type="file" accept="video/*" id="videoUpload" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onchange="updateFileCount('videoUpload', 'videoCount', 1)">
                            <i class="fas fa-video text-2xl text-slate-400 file-input-icon mb-2"></i>
                            <p class="text-xs text-slate-500" id="videoCount">Klik atau Drag 1 video ke sini</p>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="block text-sm font-semibold text-slate-700">Link YouTube</label>
                        <div class="flex gap-2 h-full">
                            <div class="relative flex-grow">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="fab fa-youtube text-red-500 text-lg"></i>
                                </div>
                                <input type="url" id="ytLink" placeholder="https://youtube.com/..." class="w-full h-full pl-10 p-3 border border-slate-300 rounded-xl bg-white focus:ring-2 focus:ring-blue-500 outline-none transition text-sm">
                            </div>
                            <button onclick="extractFromBackend()" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-xl text-sm font-bold transition flex items-center gap-2 whitespace-nowrap shadow-md">
                                <i class="fas fa-bolt"></i> Ekstrak
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Section 2: Prompt Details -->
            <div class="grid md:grid-cols-2 gap-8">
                <div class="space-y-4">
                    <label class="block text-sm font-bold text-slate-800">Deskripsi Kejadian Video:</label>
                    <textarea id="refInput" class="w-full p-4 border border-slate-300 rounded-2xl bg-white focus:ring-2 focus:ring-blue-500 outline-none transition" rows="4" placeholder="Contoh: Seorang pria paruh baya berlari..."></textarea>
                </div>
                <div class="space-y-4">
                    <label class="block text-sm font-bold text-slate-800">Gaya Visual:</label>
                    <select id="styleInput" class="w-full p-4 border border-slate-300 rounded-2xl bg-white outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="Futuristic">Futuristic / Cyberpunk</option>
                        <option value="Ghibli">Anime Studio Ghibli</option>
                        <option value="Macro">Ultra-Realistic Macro</option>
                        <option value="Montessori">Montessori Story</option>
                    </select>
                </div>
            </div>

            <button onclick="generateStoryboard()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-5 rounded-2xl transition-all shadow-lg flex justify-center items-center gap-2 text-lg">
                <i class="fas fa-magic"></i> Generate 15s Storyboard
            </button>

            <div id="resultSection" class="hidden space-y-8 mt-10 border-t border-slate-200 pt-10">
                <div id="segments" class="space-y-6"></div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-5 right-5 bg-green-600 text-white px-6 py-3 rounded-xl shadow-2xl translate-y-20 opacity-0 flex items-center gap-3 z-50">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage"></span>
    </div>

    <script>
        // GANTI URL DI BAWAH DENGAN URL VERCEL BACKEND ANDA
        const API_BASE_URL = "https://backend-ai-api.vercel.app";

        async function extractFromBackend() {
            const url = document.getElementById('ytLink').value;
            if(!url) return showToast("Masukkan Link!", true);
            
            showToast("Menghubungkan ke API Backend...");
            try {
                const response = await fetch(`${API_BASE_URL}/api/extract`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const data = await response.json();
                document.getElementById('refInput').value = data.summary;
                showToast("Data diekstrak via Backend!");
            } catch (error) {
                showToast("Gagal terhubung ke Backend", true);
            }
        }

        function showToast(msg, error = false) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.className = `fixed bottom-5 right-5 text-white px-6 py-3 rounded-xl shadow-2xl transition-all flex items-center gap-3 z-50 ${error ? 'bg-red-600' : 'bg-green-600'}`;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        function updateFileCount(id, textId, max) { /* ... logika file ... */ }
        function generateStoryboard() { /* ... logika storyboard ... */ }
    </script>
</body>
</html>
